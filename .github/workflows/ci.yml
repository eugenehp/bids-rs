name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - run: sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude pybids-rs
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true
          RUSTFLAGS: -Dwarnings -Clink-arg=-fuse-ld=mold

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.7
      - run: sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude pybids-rs -- -Dwarnings
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true
          RUSTFLAGS: -Dwarnings -Clink-arg=-fuse-ld=mold

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - run: sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude pybids-rs --exclude bids-e2e-tests
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true
          RUSTFLAGS: -Dwarnings -Clink-arg=-fuse-ld=mold

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - run: sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --exclude pybids-rs --no-deps
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true
          RUSTFLAGS: -Dwarnings -Clink-arg=-fuse-ld=mold
          RUSTDOCFLAGS: -Dwarnings

  # Verify BIDS spec version tracking invariants
  spec-version:
    name: Spec Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - run: sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p bids-schema -- version
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true
          RUSTFLAGS: -Dwarnings -Clink-arg=-fuse-ld=mold

  # Validate against official bids-examples (auto-downloaded by fixture system)
  bids-examples:
    name: BIDS Examples Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - run: sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test -p bids-e2e-tests --test bids_examples -- --nocapture
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true
          RUSTFLAGS: -Dwarnings -Clink-arg=-fuse-ld=mold
